<!DOCTYPE html>
<html lang="en">

  <style>
:root {
  --bg: #1C1C1E;
  --surface: #2C2C2E;
  --surface-hover: #3A3A3C;
  --text: #F5F5F7;

* { margin: 0; padding: 0; box-sizing: border-box; }
body {

}
.app { max-width: 600px; margin: 0 auto; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
h1 { font-size: 28px; font-weight: 700; }
.week-counter { background: var(--surface); padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; }
.week-counter.on-track { color: var(--green); }
.week-counter.behind { color: var(--orange); }
.week-counter.critical { color: var(--red); }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tab { background: var(--surface); border: none; color: var(--text-secondary); padding: 10px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }

.hint { font-weight: 400; text-transform: none; letter-spacing: 0; opacity: 0.7; }
input, textarea, select { width: 100%; background: var(--surface); border: 1px solid transparent; border-radius: var(--radius); padding: 12px 16px; color: var(--text); font-size: 16px; font-family: inherit; transition: border-color 0.2s; }
input:focus, textarea:focus { outline: none; border-color: var(--accent); }
textarea { resize: vertical; }
.btn-generate { width: 100%; padding: 14px 20px; background: var(--surface); border: 1px solid var(--accent); border-radius: var(--radius); color: var(--accent); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; }

.entry-name { font-weight: 600; font-size: 16px; }
.entry-date { font-size: 13px; color: var(--text-secondary); }

.entry-summary { font-size: 14px; color: var(--text-secondary); line-height: 1.4; }

.entry-delete:hover { opacity: 1; }

.btn-export { background: var(--surface); border: 1px solid var(--accent); color: var(--accent); padding: 8px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-export:hover { background: rgba(0,122,255,0.15); }
.btn-export.copied { background: var(--green); border-color: var(--green); color: white; }
.recap-preview { margin-top: 16px; background: var(--surface); border-radius: var(--radius); padding: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; color: var(--text); min-height: 100px; }
.recap-header { font-weight: 700; font-size: 16px; margin-bottom: 12px; color: var(--accent); }
.recap-stat { color: var(--text-secondary); margin-bottom: 12px; font-size: 13px; }
.recap-entry { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--surface-hover); }
.recap-entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.entry-notes { font-size: 13px; color: var(--text); margin-top: 6px; padding: 8px 10px; background: var(--bg); border-radius: 8px; line-height: 1.4; font-style: italic; }
.entry-notes::before { content: 'Notes: '; font-style: normal; font-weight: 600; color: var(--text-secondary); }
.roster-summary { margin-bottom: 16px; padding: 12px 16px; background: var(--surface); border-radius: var(--radius); font-size: 14px; color: var(--text-secondary); }
.roster-summary strong { color: var(--text); }
.roster-list { display: flex; flex-direction: column; gap: 8px; }
.roster-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--surface); border-radius: var(--radius); }
.roster-name { font-weight: 600; font-size: 15px; }
.roster-date { font-size: 13px; color: var(--text-secondary); }
.roster-coached { border-left: 3px solid var(--green); }
.roster-not-coached { border-left: 3px solid var(--red); opacity: 0.8; }
.roster-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 10px; }
.roster-badge.coached { background: rgba(52,199,89,0.15); color: var(--green); }
.roster-badge.overdue { background: rgba(255,59,48,0.15); color: var(--red); }

<body>
  <div class="app">
    <header>
      <h1>Coach Log</h1>
      <div class="week-counter" id="weekCounter">0/5 this week</div>
    </header>
    <div class="tabs">
      <button class="tab active" data-tab="log">Log Entry</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="roster">Roster</button>
      <button class="tab" data-tab="recap">Recap</button>
    </div>
    <section id="logTab" class="tab-content active">
      <form id="coachForm">
        <div class="field">
          <label for="memberName">Team Member</label>
          <select id="memberName" required>
            <option value="">Loading team...</option>
          </select>
        </div>
        <div class="field">
          <label for="roughNotes">What did you talk about?</label>
          <textarea id="roughNotes" rows="3" placeholder="long breaks, attendance, agreed on phone alarm..."></textarea>
        </div>
        <button type="button" class="btn-generate" id="generateBtn">Generate Topic and Summary</button>
        <div id="generatedSection" class="generated-section hidden">
          <div class="field">
            <label for="topic">Topic</label>
            <input type="text" id="topic">
          </div>
          <div class="field">
            <label for="summary">Summary <span class="hint">(edit if needed)</span></label>
            <textarea id="summary" rows="4"></textarea>
          </div>
          <button type="submit" class="btn-save">Save Entry</button>
        </div>
      </form>
    </section>
    <section id="historyTab" class="tab-content">
      <div class="filter-row">
        <select id="weekFilter">
          <option value="current">This Week</option>
          <option value="last">Last Week</option>
          <option value="all">All Time</option>
        </select>
      </div>
      <div id="historyList" class="history-list"></div>
    </section>
    <section id="recapTab" class="tab-content">
      <div class="filter-row" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <select id="recapFilter">
          <option value="today">Today</option>
          <option value="week">This Week</option>
          <option value="month">This Month</option>
        </select>
        <button class="btn-export" id="shareBtn">Share Recap</button>
        <button class="btn-export" id="copyBtn">Copy to Clipboard</button>
      </div>

    </section>
    <section id="rosterTab" class="tab-content">
      <div class="roster-summary" id="rosterSummary"></div>
      <div id="rosterList" class="roster-list"></div>
    </section>
  </div>
<script>
// === Supabase client ===
const SUPABASE_URL = 'https://nocbnwzdiuwdykehnbal.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vY2Jud3pkaXV3ZHlrZWhuYmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTk2NDAsImV4cCI6MjA5MzU3NTY0MH0.f1KP8iQF5oP8c3J-4Uf4VKm4oZKkSpgCGz4QdPOSjPo';

async function supabaseRequest(method, path, body) {
  const opts = { method, headers: {
    'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': method === 'POST' ? 'return=representation' : undefined
  }};
  if (body) opts.body = JSON.stringify(body);
  Object.keys(opts.headers).forEach(k => { if (opts.headers[k] === undefined) delete opts.headers[k]; });
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
async function getEntries() {
  try { return (await supabaseRequest('GET', 'coaching_entries?order=date.desc')) || []; }
  catch (e) { console.error('Supabase fetch failed, using localStorage fallback:', e); return JSON.parse(localStorage.getItem('coach_log_entries') || '[]'); }
}
async function saveEntry(entry) {
  try { await supabaseRequest('POST', 'coaching_entries', entry); }
  catch (e) { console.error('Supabase save failed, saving to localStorage:', e); const entries = JSON.parse(localStorage.getItem('coach_log_entries') || '[]'); entries.push(entry); localStorage.setItem('coach_log_entries', JSON.stringify(entries)); }
}
async function deleteEntryById(id) {
  try { await supabaseRequest('DELETE', 'coaching_entries?id=eq.' + id); } catch (e) { console.error('Delete failed:', e); }
}

// === Templates engine ===
const TOPIC_MAP = {
  attendance:{topic:'Attendance and Reliability',category:'accountability'},late:{topic:'Punctuality and Time Management',category:'accountability'},lates:{topic:'Punctuality and Time Management',category:'accountability'},tardy:{topic:'Punctuality and Time Management',category:'accountability'},callout:{topic:'Attendance Accountability',category:'accountability'},'call out':{topic:'Attendance Accountability',category:'accountability'},'no show':{topic:'Attendance Accountability',category:'accountability'},breaks:{topic:'Break Adherence',category:'accountability'},'long breaks':{topic:'Break Timeliness and Self-Management',category:'accountability'},break:{topic:'Break Adherence',category:'accountability'},schedule:{topic:'Schedule Adherence',category:'accountability'},time:{topic:'Time Management',category:'accountability'},phone:{topic:'Device Policy Compliance',category:'accountability'},uniform:{topic:'Dress Code and Presentation',category:'accountability'},dress:{topic:'Dress Code and Presentation',category:'accountability'},customer:{topic:'Customer Experience Focus',category:'customer'},nps:{topic:'Net Promoter and Customer Advocacy',category:'customer'},service:{topic:'Service Recovery and Customer Care',category:'customer'},recovery:{topic:'Service Recovery',category:'customer'},feedback:{topic:'Customer Feedback Review',category:'customer'},detractor:{topic:'Detractor Recovery Coaching',category:'customer'},sale:{topic:'Sales Approach and Engagement',category:'performance'},sales:{topic:'Sales Approach and Engagement',category:'performance'},goal:{topic:'Goal Progress Check-In',category:'development'},goals:{topic:'Goal Progress Check-In',category:'development'},career:{topic:'Career Development',category:'development'},growth:{topic:'Professional Growth',category:'development'},promotion:{topic:'Career Progression Planning',category:'development'},skill:{topic:'Skill Development',category:'development'},training:{topic:'Training and Development',category:'development'},strength:{topic:'Strengths Recognition',category:'development'},win:{topic:'Recognition and Momentum',category:'development'},great:{topic:'Recognition and Momentum',category:'development'},awesome:{topic:'Recognition and Positive Reinforcement',category:'development'},team:{topic:'Team Collaboration',category:'engagement'},workload:{topic:'Workload and Capacity Check-In',category:'engagement'},stress:{topic:'Wellbeing and Workload Balance',category:'engagement'},morale:{topic:'Engagement and Morale',category:'engagement'},motivation:{topic:'Motivation and Engagement',category:'engagement'},conflict:{topic:'Interpersonal Communication',category:'engagement'},communication:{topic:'Communication Effectiveness',category:'engagement'},attitude:{topic:'Professional Conduct and Attitude',category:'accountability'},behavior:{topic:'Workplace Behavior',category:'accountability'},quality:{topic:'Work Quality Standards',category:'performance'},speed:{topic:'Efficiency and Throughput',category:'performance'},productivity:{topic:'Productivity and Focus',category:'performance'},metrics:{topic:'Performance Metrics Review',category:'performance'},followup:{topic:'Follow-Up on Prior Commitment',category:'accountability'},'follow up':{topic:'Follow-Up on Prior Commitment',category:'accountability'},checkin:{topic:'General Check-In',category:'engagement'},'check in':{topic:'General Check-In',category:'engagement'}
};
const SUMMARY_TEMPLATES = {
  accountability:[
    'Spoke with {name} regarding {keywords}. Discussed specific expectations around {area} and how it directly impacts team operations and morale. Reviewed recent instances and patterns. {name} acknowledged the feedback{agreement}. A clear action plan was established with measurable goals.',
    'Had a focused coaching conversation with {name} about {keywords}. Walked through specific recent examples and connected them to broader team expectations. Discussed the root causes behind current patterns and brainstormed practical solutions together{agreement}. Set a concrete timeline for improvement with check-in milestones.',
    'Pulled {name} aside for a direct conversation about {keywords}. Laid out the specific concern with examples from recent shifts, explained the downstream effect on the team, and asked for their perspective. {name} was receptive to the feedback{agreement}. Agreed on specific next steps and accountability measures.'
  ],
  customer:[
    'Discussed {keywords} with {name}. Reviewed specific recent customer interactions and identified concrete opportunities to elevate the experience. Talked through what strong engagement looks like at each stage of the interaction and how to read customer signals more effectively{agreement}. Outlined specific techniques to practice on the next several shifts.',
    'Coached {name} on {keywords}. Walked through real examples from recent shifts — what went well and where there were missed opportunities. Discussed the difference between transactional and consultative approaches and how to make customers feel genuinely heard{agreement}. Set a goal to apply specific techniques this week.',
    'Had a detailed conversation with {name} about {keywords}. Pulled specific customer feedback and used it as a coaching anchor. Discussed how to personalize the experience, ask better discovery questions, and handle objections with empathy{agreement}.'
  ],
  development:[
    'Connected with {name} about {keywords}. Discussed where they are in their growth journey, what skills they want to sharpen, and what specific opportunities exist in the near term. Identified concrete next steps — including stretch assignments and learning resources — to accelerate their development{agreement}.',
    'Had a meaningful development conversation with {name} focused on {keywords}. Recognized specific recent wins and contributions that demonstrate growth. Explored what challenges are stretching them right now and how to lean into those productively{agreement}. Mapped out a short-term development plan with clear milestones.',
    'Sat down with {name} to discuss {keywords} and their career trajectory. Talked through strengths they should continue leveraging and areas where focused effort will unlock the next level. Discussed specific actions — mentorship, cross-training, and project ownership — that would build their skillset{agreement}.'
  ],
  engagement:[
    'Checked in with {name} regarding {keywords}. Took time to genuinely listen to their perspective on how things are going — workload, team dynamics, and overall satisfaction. Discussed specific ways to keep them engaged and supported, including workload adjustments and recognition opportunities{agreement}.',
    'Connected with {name} on {keywords}. Opened up space for an honest conversation about how they are feeling on the team. Explored what is energizing them and what is draining them right now. Discussed practical changes we can make together to improve their day-to-day experience{agreement}.',
    'Had a one-on-one with {name} about {keywords}. Wanted to get a genuine pulse check beyond surface level. Discussed team morale, workload balance, and what support looks like for them. Identified a few specific adjustments we can make immediately{agreement}.'
  ],
  performance:[
    'Discussed {keywords} with {name}. Reviewed current performance metrics and trends in detail, identifying specific areas where results are strong and where targeted improvement is needed. Talked through the gap between current performance and expectations, and co-developed an action plan with clear, measurable targets{agreement}.',
    'Coached {name} on {keywords}. Went through recent results with specific data points and examples. Identified patterns in their approach that are either helping or holding them back. Worked together to set focused goals for the coming week with daily actions they can take to move the needle{agreement}.',
    'Had a performance-focused conversation with {name} about {keywords}. Reviewed the numbers side by side and connected them to specific behaviors and habits. Discussed what top performers in similar roles do differently and how to adapt those practices. Set clear expectations with a realistic timeline{agreement}.'
  ]
};
function detectKeywords(text) {
  const lower = text.toLowerCase(), matches = [];
  const sortedKeys = Object.keys(TOPIC_MAP).sort((a,b)=>b.length-a.length);
  for (const key of sortedKeys) { if (lower.includes(key)) matches.push({key,...TOPIC_MAP[key]}); }
  return matches;
}
function generateTopic(notes) {
  const m = detectKeywords(notes);
  if (m.length===0) return 'Coaching Conversation';
  if (m.length===1) return m[0].topic;
  return m[0].topic+' and '+m[1].topic.split(' ').slice(-1)[0];
}
function generateSummary(name, notes) {
  const matches = detectKeywords(notes);
  const category = matches.length>0?matches[0].category:'engagement';
  const templates = SUMMARY_TEMPLATES[category];
  const template = templates[Math.floor(Math.random()*templates.length)];
  const lower = notes.toLowerCase();
  let agreement = '';
  if (lower.includes('agreed')||lower.includes('commit')||lower.includes('will')) {
    const idx = Math.max(lower.indexOf('agreed'),lower.indexOf('commit'),lower.indexOf('will'));
    if (idx>-1) { const snippet=notes.substring(idx).split(/[.,!]/)[0].trim(); if(snippet.length>5&&snippet.length<100) agreement=' — '+snippet; }
  }
  if (!agreement) agreement=' and committed to improvement';
  const keywords = matches.length>0?matches.slice(0,2).map(m=>m.key).join(' and '):notes.substring(0,30).trim();
  return template.replace(/{name}/g,capitalize(name)).replace(/{keywords}/g,keywords).replace(/{area}/g,matches.length>0?matches[0].key:'expectations').replace(/{agreement}/g,agreement);
}
function capitalize(str) { return str.charAt(0).toUpperCase()+str.slice(1); }

// === App logic ===
const STORAGE_KEY='coach_log_entries';
let entriesCache=[];
function getWeekStart(date) {
  const d=new Date(date); const day=d.getDay(); const diff=d.getDate()-day+(day===0?-6:1);
  const monday=new Date(d.setDate(diff)); monday.setHours(0,0,0,0); return monday;
}
function getThisWeekEntries() { const ws=getWeekStart(new Date()); return entriesCache.filter(e=>new Date(e.date)>=ws); }
function updateCounter() {
  const count=getThisWeekEntries().length; const el=document.getElementById('weekCounter');
  el.textContent=count+'/5 this week'; el.className='week-counter';
  if(count>=5)el.classList.add('on-track');else if(count>=3)el.classList.add('behind');else el.classList.add('critical');
}
function formatDate(ds) { return new Date(ds).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function escapeHtml(text) { if(!text)return''; const d=document.createElement('div'); d.textContent=text; return d.innerHTML; }
function renderHistory() {
  const filter=document.getElementById('weekFilter').value;
  const now=new Date(),thisWS=getWeekStart(now),lastWS=new Date(thisWS); lastWS.setDate(lastWS.getDate()-7);
  let filtered;
  if(filter==='current') filtered=entriesCache.filter(e=>new Date(e.date)>=thisWS);
  else if(filter==='last') filtered=entriesCache.filter(e=>{const d=new Date(e.date);return d>=lastWS&&d<thisWS;});
  else filtered=entriesCache;
  const list=document.getElementById('historyList');
  if(filtered.length===0){list.innerHTML='<div class="empty-state">No entries yet</div>';return;}
  filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  list.innerHTML=filtered.map(entry=>'<div class="entry-card"><div class="entry-header"><span class="entry-name">'+escapeHtml(entry.name)+'</span><span class="entry-date">'+formatDate(entry.date)+'</span></div><div class="entry-topic">'+escapeHtml(entry.topic)+'</div>'+(entry.notes?'<div class="entry-notes">'+escapeHtml(entry.notes)+'</div>':'')+'<div class="entry-summary">'+escapeHtml(entry.summary)+'</div><button class="entry-delete" onclick="handleDelete(\''+entry.id+'\')">Delete</button></div>').join('');
}
async function handleDelete(id){if(!confirm('Delete this entry?'))return;await deleteEntryById(id);await refreshEntries();}
async function refreshEntries(){entriesCache=await getEntries();updateCounter();renderHistory();}

// Tabs
document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  tab.classList.add('active');document.getElementById(tab.dataset.tab+'Tab').classList.add('active');
  if(tab.dataset.tab==='history')renderHistory();
  if(tab.dataset.tab==='recap')renderRecap();
  if(tab.dataset.tab==='roster')renderRoster();
});});
// Generate
document.getElementById('generateBtn').addEventListener('click',function(){
  const name=document.getElementById('memberName').value.trim();
  const notes=document.getElementById('roughNotes').value.trim();

// Save
document.getElementById('coachForm').addEventListener('submit',async function(e){
  e.preventDefault();
  const name=document.getElementById('memberName').value.trim();
  const topic=document.getElementById('topic').value.trim();
  const summary=document.getElementById('summary').value.trim();
  const notes=document.getElementById('roughNotes').value.trim();
  if(!name||!topic||!summary)return;
  const entry={id:crypto.randomUUID(),name,topic,summary,notes,date:new Date().toISOString()};

  await saveEntry(entry);
  document.getElementById('coachForm').reset();
  document.getElementById('generatedSection').classList.add('hidden');
  btn.textContent='Saved'; btn.style.background='#34C759'; btn.disabled=false;
  setTimeout(()=>{btn.textContent='Save Entry';btn.style.background='';},1500);
  await refreshEntries();
});
document.getElementById('weekFilter').addEventListener('change',renderHistory);
// Load team members from Supabase
async function loadTeamMembers(){
  const select=document.getElementById('memberName');
  try{
    const members=await supabaseRequest('GET','team_members?order=name.asc');
    select.innerHTML='<option value="">Select team member...</option>'+members.map(m=>'<option>'+m.name+'</option>').join('');
  }catch(e){console.error('Failed to load team:',e);select.innerHTML='<option value="">Error loading team</option>';}
}
loadTeamMembers();
refreshEntries();

// === Recap ===
function getRecapEntries(range) {
  const now = new Date();
  if (range === 'today') {
    const start = new Date(now); start.setHours(0,0,0,0);
    return entriesCache.filter(e => new Date(e.date) >= start);
  } else if (range === 'week') {
    return getThisWeekEntries();
  } else {
    const start = new Date(now.getFullYear(), now.getMonth(), 1);
    return entriesCache.filter(e => new Date(e.date) >= start);
  }
}
function buildRecapText(range) {
  const entries = getRecapEntries(range);
  const labels = {today:'Today',week:'This Week',month:'This Month'};
  let text = 'Coaching Recap — ' + labels[range] + '\n';
  text += entries.length + ' conversation' + (entries.length===1?'':'s') + '\n';
  const names = [...new Set(entries.map(e=>e.name))];
  text += 'Team members: ' + (names.length > 0 ? names.join(', ') : 'None') + '\n\n';
  if (entries.length === 0) { text += 'No coaching entries for this period.'; return text; }
  entries.sort((a,b) => new Date(b.date) - new Date(a.date));
  entries.forEach(e => {
    text += '• ' + e.name + ' (' + formatDate(e.date) + ')\n';
    text += '  Topic: ' + e.topic + '\n';
    if (e.notes) text += '  Notes: ' + e.notes + '\n';
    text += '  Summary: ' + e.summary + '\n\n';
  });
  return text.trim();
}
function renderRecap() {
  const range = document.getElementById('recapFilter').value;
  const entries = getRecapEntries(range);
  const names = [...new Set(entries.map(e=>e.name))];
  const labels = {today:'Today',week:'This Week',month:'This Month'};
  let html = '<div class="recap-header">Coaching Recap — '+labels[range]+'</div>';
  html += '<div class="recap-stat">'+entries.length+' conversation'+(entries.length===1?'':'s')+' · Team members: '+(names.length>0?names.join(', '):'None')+'</div>';
  if (entries.length === 0) { html += '<div class="empty-state">No entries for this period</div>'; }
  else {
    entries.sort((a,b) => new Date(b.date) - new Date(a.date));
    entries.forEach(e => {
      html += '<div class="recap-entry"><strong>'+escapeHtml(e.name)+'</strong> · '+formatDate(e.date)+'<br><span style="color:var(--accent)">'+escapeHtml(e.topic)+'</span>'+(e.notes?'<br><span style="color:var(--text);font-style:italic">Notes: '+escapeHtml(e.notes)+'</span>':'')+'<br>'+escapeHtml(e.summary)+'</div>';
    });
  }
  document.getElementById('recapPreview').innerHTML = html;
}
document.getElementById('recapFilter').addEventListener('change', renderRecap);
document.getElementById('shareBtn').addEventListener('click', function() {
  const text = buildRecapText(document.getElementById('recapFilter').value);
  if (navigator.share) {
    navigator.share({title:'Coaching Recap',text:text}).catch(()=>{});
  } else {
    window.location.href = 'mailto:?subject=Coaching Recap&body=' + encodeURIComponent(text);
  }
});
document.getElementById('copyBtn').addEventListener('click', function() {
  const text = buildRecapText(document.getElementById('recapFilter').value);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; btn.classList.remove('copied'); }, 1500);
  });
});

// === Roster ===
let teamMembersCache = [];
async function loadTeamMembersForRoster() {
  try {
    teamMembersCache = (await supabaseRequest('GET','team_members?order=name.asc')) || [];
  } catch(e) { console.error('Failed to load roster:', e); }
}
function renderRoster() {
  const thirtyDaysAgo = new Date(); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
  const rosterList = document.getElementById('rosterList');
  const rosterSummary = document.getElementById('rosterSummary');
  if (teamMembersCache.length === 0) {
    rosterList.innerHTML = '<div class="empty-state">Loading roster...</div>';
    loadTeamMembersForRoster().then(renderRoster);
    return;
  }
  const rosterData = teamMembersCache.map(member => {
    const memberEntries = entriesCache.filter(e => e.name === member.name);
    const recentEntries = memberEntries.filter(e => new Date(e.date) >= thirtyDaysAgo);
    const lastCoached = memberEntries.length > 0 ? memberEntries.reduce((latest, e) => new Date(e.date) > new Date(latest.date) ? e : latest) : null;
    return { name: member.name, lastCoached, recentCount: recentEntries.length, coached: recentEntries.length > 0 };
  });
  const coachedCount = rosterData.filter(r => r.coached).length;
  const notCoachedCount = rosterData.filter(r => !r.coached).length;
  rosterSummary.innerHTML = '<strong>' + coachedCount + '</strong> coached in last 30 days · <strong style="color:var(--red)">' + notCoachedCount + '</strong> not yet coached · <strong>' + teamMembersCache.length + '</strong> total';
  // Sort: not coached first, then by last coached date (oldest first)
  rosterData.sort((a, b) => {
    if (a.coached !== b.coached) return a.coached ? 1 : -1;
    if (!a.lastCoached && !b.lastCoached) return a.name.localeCompare(b.name);
    if (!a.lastCoached) return -1;
    if (!b.lastCoached) return 1;
    return new Date(a.lastCoached.date) - new Date(b.lastCoached.date);
  });
  rosterList.innerHTML = rosterData.map(r => {
    const cls = r.coached ? 'roster-coached' : 'roster-not-coached';
    const badge = r.coached
      ? '<span class="roster-badge coached">' + r.recentCount + 'x this month</span>'
      : '<span class="roster-badge overdue">Not coached</span>';
    const dateStr = r.lastCoached ? formatDate(r.lastCoached.date) : 'Never';
    return '<div class="roster-row ' + cls + '"><div><div class="roster-name">' + escapeHtml(r.name) + '</div><div class="roster-date">Last: ' + dateStr + '</div></div><div>' + badge + '</div></div>';
  }).join('');
}
</script>
